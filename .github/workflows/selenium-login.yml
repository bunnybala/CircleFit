name: React Build, Selenium Test & Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Bala@1
          MYSQL_DATABASE: circlefit
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 22
        cache: 'npm'
        cache-dependency-path: CircleFit_web/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: CircleFit_web
      run: |
        npm install

    - name: Run Backend, Frontend, and Selenium Tests
      run: |
        # Pre-compile the backend to make bootRun start instantly
        cd backend
        chmod +x gradlew
        ./gradlew classes
        
        # Start Java Spring Boot backend in background (redirect stdin to prevent suspension)
        ./gradlew bootRun < /dev/null &
        
        # Start React Vite app in background (redirect stdin to prevent suspension)
        cd ../CircleFit_web
        npm run dev < /dev/null &
        
        # Wait for both services to be fully listening on their ports
        echo "Waiting for ports 8081 and 5173 to open..."
        npx wait-on tcp:localhost:8081 tcp:localhost:5173 --timeout 60000
        
        # Execute Selenium E2E tests
        cd selenium-tests
        npm install
        npm test
      env:
        PORT: 5173

    - name: Build Production Bundle
      working-directory: CircleFit_web
      run: |
        npm run build

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: CircleFit_web/dist
        branch: gh-pages
        token: ${{ secrets.GITHUB_TOKEN }}
