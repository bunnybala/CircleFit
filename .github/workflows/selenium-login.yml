name: React Build, Selenium Test & Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: Bala@1
          MYSQL_DATABASE: circlefit
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Run Backend App in Background
      run: |
        cd backend
        chmod +x gradlew
        ./gradlew bootRun &
        sleep 15

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'
        cache-dependency-path: CircleFit_web/package-lock.json

    - name: Install Frontend Dependencies
      working-directory: CircleFit_web
      run: |
        npm install

    - name: Start React App in Background
      working-directory: CircleFit_web
      run: |
        npm run dev &
      env:
        PORT: 5173

    - name: Run Selenium Tests
      working-directory: CircleFit_web/selenium-tests
      run: |
        npm install
        npm test

    - name: Build Production Bundle
      working-directory: CircleFit_web
      run: |
        npm run build

    - name: Deploy to GitHub Pages
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: CircleFit_web/dist
        branch: gh-pages
        token: ${{ secrets.GITHUB_TOKEN }}
